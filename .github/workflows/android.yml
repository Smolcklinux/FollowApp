name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        # O flag --legacy-peer-deps é vital para evitar conflitos de versão do React 19
        run: |
          npm install --legacy-peer-deps
          echo "Verificando se o script de Autolinking foi instalado..."
          ls node_modules/@react-native-community/cli-platform-android/native_modules.gradle

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew
          
          # Limpeza de builds anteriores
          ./gradlew clean
          
          # Gera os arquivos necessários para a Nova Arquitetura
          ./gradlew generateCodegenArtifactsFromSchema
          
          # Compila o APK final
          ./gradlew assembleRelease -x lint
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FollowApp-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
