name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @react-native-community/cli --save-dev
          # Aplica correções de segurança recomendadas
          npm audit fix --force

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build Android Release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          cd android
          chmod +x gradlew
          
          # Cria a pasta e gera o JSON de autolinking necessário para o Gradle 9+
          mkdir -p build/generated/autolinking
          npx react-native config > build/generated/autolinking/autolinking.json
          
          # Limpeza de builds anteriores
          ./gradlew clean
          
          # GERAÇÃO DE CÓDIGO (Codegen): Resolve o erro de 'Props.h file not found'
          ./gradlew generateCodegenArtifactsFromSchema
          
          # Compilação final do APK
          ./gradlew assembleRelease -x lint
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FollowApp-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
