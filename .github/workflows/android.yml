name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @react-native-community/cli --save-dev

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build Android Release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          # 1. Preparar pastas
          mkdir -p android/build/generated/autolinking
          
          # 2. GERAR O CONFIG REAL (Resolve o erro do packageName)
          # Usamos o CLI para extrair os dados do seu projeto e salvar no local que o Gradle exige
          npx react-native config > android/build/generated/autolinking/autolinking.json
          
          # 3. Entrar na pasta android e buildar
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -x lint
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FollowApp-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
