name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Atualizado para evitar avisos de depreciação
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # Garante que o CLI necessário para o post-build esteja presente
          npm install @react-native-community/cli --save-dev

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build Android Release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          # Força o ambiente a usar Node 24 para as Actions
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          cd android
          chmod +x gradlew
          
          # Limpeza de segurança
          ./gradlew clean
          
          # Compilação do APK (Otimizada sem o npx config que travava o pós-build)
          ./gradlew assembleRelease -x lint
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FollowApp-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
