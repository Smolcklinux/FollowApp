name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: |
          # Limpeza preventiva para garantir que o node_modules seja criado corretamente
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build Android Release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          cd android
          chmod +x gradlew
          
          # Garante o diretório do autolinking
          mkdir -p build/generated/autolinking
          npx react-native config > build/generated/autolinking/autolinking.json
          
          ./gradlew clean
          ./gradlew assembleRelease -x lint
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FollowApp-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
