name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        # O flag --legacy-peer-deps resolve conflitos do React 19
        run: |
          npm install --legacy-peer-deps
          echo "Verificando se o script de Autolinking existe..."
          ls node_modules/@react-native-community/cli-platform-android/native_modules.gradle

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build Android Release
        # Definimos o PROJECT_ROOT para que o Gradle não use o /dev/null
        env:
          PROJECT_ROOT: ${{ github.workspace }}
        run: |
          cd android
          chmod +x gradlew
          
          # Limpeza e compilação
          ./gradlew clean
          
          # Passo crucial para a Nova Arquitetura do RN 0.85
          ./gradlew generateCodegenArtifactsFromSchema
          
          # Gera o APK pulando o lint para evitar erros bobos de análise de código
          ./gradlew assembleRelease -x lint
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FollowApp-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
