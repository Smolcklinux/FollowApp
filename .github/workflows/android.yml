name: Build Android APK

on:
  push:
    branches: [ main ] # O build dispara sempre que você envia algo para a branch main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        # Este passo é CRÍTICO: ele cria a pasta node_modules necessária para o Autolinking
        run: npm install --legacy-peer-deps

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Versão necessária para React Native 0.85 + Gradle 8
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build Android Release
        run: |
          cd android
          # Dá permissão de execução ao Gradle
          chmod +x gradlew
          
          # Limpa builds anteriores e arquivos temporários
          ./gradlew clean
          
          # Comando para preparar a Nova Arquitetura (New Arch)
          ./gradlew generateCodegenArtifactsFromSchema
          
          # Gera o APK de produção (Release) pulando testes de lint para ser mais rápido
          ./gradlew assembleRelease -x lint
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FollowApp-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7 # O link para download do APK ficará ativo por 7 dias
