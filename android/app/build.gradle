apply plugin: "com.android.application"
apply plugin: "com.facebook.react" // O plugin do React deve vir logo após o do Android
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.google.gms.google-services"

def mCompileSdk = 34
def mTargetSdk = 34
def mMinSdk = 24

android {
    compileSdk mCompileSdk
    namespace "com.follow.app"

    defaultConfig {
        applicationId "com.follow.app"
        minSdk mMinSdk
        targetSdk mTargetSdk
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

/**
 * CONFIGURAÇÃO DO REACT NATIVE
 * No RN 0.85, se o cliPath der erro, tente usar a forma simplificada
 */
react {
    // Se o erro do /dev/null persistir, mantenha estas linhas. 
    // Caso contrário, o plugin costuma encontrar sozinho se o PROJECT_ROOT estiver no gradle.properties
    cliPath = "../node_modules/react-native/cli.js"
    root = file("../../")
    
    hermesEnabled = true
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-analytics'
    
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation "org.webkit:android-jsc:+"
    }
}
