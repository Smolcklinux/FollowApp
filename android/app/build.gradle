apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services" // Plugin do Firebase

/**
 * Configurações do React Native
 */
react {
    /* Folha de especificações para o Autolinking */
    autolinkLibrariesWithApp()

    /* Configurações para evitar o erro de 'Empty output' no /dev/null */
    cliPath = "../node_modules/react-native/cli.js"
    root = file("../../")

    /* Motor JS e Nova Arquitetura */
    hermesEnabled = true
}

/**
 * Define se o Proguard deve ser usado para reduzir o tamanho do APK
 */
def enableProguardInReleaseBuilds = false

/**
 * Define a arquitetura padrão para o build
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.follow.app"
    defaultConfig {
        applicationId "com.follow.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        // Necessário para o Firebase e Nova Arquitetura
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            } else {
                // Usa a chave de debug se a de release não estiver configurada (apenas para teste)
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

dependencies {
    // Dependência principal do React Native
    implementation("com.facebook.react:react-android")

    // Firebase (BoM garante versões compatíveis entre os módulos)
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-analytics'

    // Motor Hermes para performance
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
