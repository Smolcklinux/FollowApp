apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

// IMPORTANTE: Definir as variáveis explicitamente aqui caso o rootProject falhe
def mCompileSdk = 34
def mTargetSdk = 34
def mMinSdk = 24

android {
    // RESOLVE O ERRO: "does not specify compileSdk"
    compileSdk mCompileSdk
    
    namespace "com.follow.app"

    defaultConfig {
        applicationId "com.follow.app"
        minSdk mMinSdk
        targetSdk mTargetSdk
        versionCode 1
        versionName "1.0"
        
        multiDexEnabled true
    }

    // Configurações do React Native dentro do bloco android para algumas versões
    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

/**
 * Configurações do React Native (Fora do bloco android)
 */
react {
    autolinkLibrariesWithApp()
    cliPath = "../node_modules/react-native/cli.js"
    root = file("../../")
    hermesEnabled = true
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-analytics'
    
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation "org.webkit:android-jsc:+"
    }
}
