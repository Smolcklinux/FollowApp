buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24
        compileSdkVersion = 34
        targetSdkVersion = 34
        // NDK e Kotlin recomendados para RN 0.85 e New Arch
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Plugin do Android Gradle estável
        classpath("com.android.tools.build:gradle:8.2.1")
        
        // Plugin do React Native (Essencial para o Codegen/New Arch)
        classpath("com.facebook.react:react-native-gradle-plugin")
        
        // Plugin do Kotlin
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        
        // Plugin do Google Services para o Firebase (Versão 4.4.2 está ótima)
        classpath("com.google.gms:google-services:4.4.2")
    }
}

/**
 * Configuração de repositórios para todos os módulos
 */
allprojects {
    repositories {
        google()
        mavenCentral()
        // Adicionamos o maven local para o caso de bibliotecas autolinkadas
        maven {
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            url("$rootDir/../node_modules/jsc-android/dist")
        }
    }
}

// Removi o bloco de "resolutionStrategy" antigo para evitar conflitos com AndroidX
