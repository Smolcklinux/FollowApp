# CONFIGURAÇÕES DE MEMÓRIA (JVM)
# Aumentado para suportar a compilação pesada do C++ da Nova Arquitetura
org.gradle.jvmargs=-Xmx4048m -XX:MaxMetaspaceSize=1024m

# SUPORTE PARA ANDROIDX
android.useAndroidX=true
android.enableJetifier=true

# --- NOVA ARQUITETURA (OBRIGATÓRIO PARA RN 0.85) ---
newArchEnabled=true
hermesEnabled=true

# OTIMIZAÇÃO DE ARQUITETURAS
# Limitar as arquiteturas acelera o build no CI
reactNative.Architectures=arm64-v8a,x86_64

# --- FIX PARA AUTOLINKING ---
# Caminho para o plugin encontrar as node_modules na raiz do FollowApp
PROJECT_ROOT=..
reactNative.nodeExecutableAndArgs=node

# SUPRESSÃO DE AVISOS
RNFB_SUPPRESS_NEW_ARCHITECTURE_WARNING=true

# PERFORMANCE DO GRADLE
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true
org.gradle.parallel=false
org.gradle.configureondemand=true
