# Aumenta a memória disponível para o build no GitHub Actions
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Habilita suporte para bibliotecas AndroidX modernas
android.useAndroidX=true
android.enableJetifier=true

# --- CONFIGURAÇÃO DE ARQUITETURA (RESOLUÇÃO DO ERRO) ---
# Desativa a Nova Arquitetura para compatibilidade com Image Picker e Vector Icons
newArchEnabled=false

# Mantém o motor Hermes ativo para melhor performance em JS
hermesEnabled=true

# Define as arquiteturas específicas para reduzir o tempo de build
reactNative.Architectures=armeabi-v7a,arm64-v8a
