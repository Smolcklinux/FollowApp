# CONFIGURAÇÕES DE MEMÓRIA (JVM)
# 4GB é o ideal para o Codegen não travar o servidor do GitHub
org.gradle.jvmargs=-Xmx4048m -XX:MaxMetaspaceSize=1024m

# SUPORTE PARA BIBLIOTECAS MODERNAS
android.useAndroidX=true
android.enableJetifier=true

# --- NOVA ARQUITETURA (REACT NATIVE 0.85+) ---
# Ativa a Nova Arquitetura para resolver os erros de "Props.h" que você teve
newArchEnabled=true

# Ativa o motor Hermes (obrigatório para performance na New Arch)
hermesEnabled=true

# OTIMIZAÇÃO DE ARQUITETURAS
# Focamos em 64 bits para o build ser mais rápido e compatível com a Play Store
reactNative.Architectures=arm64-v8a,x86_64

# SUPRESSÃO DE AVISOS DO FIREBASE
RNFB_SUPPRESS_NEW_ARCHITECTURE_WARNING=true

# CONFIGURAÇÕES DE VELOCIDADE E ESTABILIDADE
# Melhora a velocidade de builds incrementais e evita conflitos de nomes de recursos
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true

# Evita o erro de "Parallel Execution" em máquinas virtuais limitadas
org.gradle.parallel=false
org.gradle.configureondemand=true
