# Configurações de memória para o robô do GitHub
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Suporte para bibliotecas Android modernas
android.useAndroidX=true
android.enableJetifier=true

# --- SOLUÇÃO PARA O ERRO CMAKE ---
# Desativa a Nova Arquitetura (Fabric/TurboModules)
newArchEnabled=false

# Mantém o motor Hermes ativo para melhor performance
hermesEnabled=true
