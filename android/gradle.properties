# Aumenta a memória para o processo de Codegen e compilação C++
org.gradle.jvmargs=-Xmx4048m -XX:MaxMetaspaceSize=1024m

# Suporte Android moderno
android.useAndroidX=true
android.enableJetifier=true

# --- CONFIGURAÇÃO DEFINITIVA (NEW ARCH) ---
# Ativa a Nova Arquitetura para resolver erros de headers (Props.h)
newArchEnabled=true
hermesEnabled=true

# Foca nas arquiteturas que o GitHub Actions suporta bem
reactNative.Architectures=arm64-v8a,x86_64
