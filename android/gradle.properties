# CONFIGURAÇÕES DE MEMÓRIA (JVM)
org.gradle.jvmargs=-Xmx4048m -XX:MaxMetaspaceSize=1024m

# SUPORTE PARA BIBLIOTECAS MODERNAS
android.useAndroidX=true
android.enableJetifier=true

# --- NOVA ARQUITETURA (REACT NATIVE 0.85+) ---
newArchEnabled=true
hermesEnabled=true

# OTIMIZAÇÃO DE ARQUITETURAS
# Focamos nestas para agilizar o build no GitHub Actions
reactNative.Architectures=arm64-v8a,x86_64

# --- CORREÇÃO DE CAMINHOS (IMPORTANTE) ---
# Define a raiz do projeto para o Autolinking encontrar o node_modules
PROJECT_ROOT=..
# Força o uso do node do ambiente
reactNative.nodeExecutableAndArgs=node

# SILENCIAR AVISOS
RNFB_SUPPRESS_NEW_ARCHITECTURE_WARNING=true

# CONFIGURAÇÕES DE VELOCIDADE E ESTABILIDADE
android.nonTransitiveRClass=true
org.gradle.parallel=false
org.gradle.configureondemand=true
