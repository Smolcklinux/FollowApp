# CONFIGURAÇÕES DE MEMÓRIA (JVM)
# 4GB garantem que o Codegen e a compilação C++ não travem no GitHub Actions
org.gradle.jvmargs=-Xmx4048m -XX:MaxMetaspaceSize=1024m

# SUPORTE PARA BIBLIOTECAS MODERNAS
# Habilita o AndroidX e o Jetifier para compatibilidade com bibliotecas atuais
android.useAndroidX=true
android.enableJetifier=true

# --- NOVA ARQUITETURA (REACT NATIVE 0.85+) ---
# Ativa a Nova Arquitetura para resolver erros de headers e melhorar a performance
newArchEnabled=true

# Ativa o motor Hermes (Obrigatório para a Nova Arquitetura)
hermesEnabled=true

# OTIMIZAÇÃO DE ARQUITETURAS
# Focamos em 64 bits para agilizar o build e cumprir requisitos da Play Store
reactNative.Architectures=arm64-v8a,x86_64

# --- CORREÇÃO PARA O ERRO 'EMPTY OUTPUT' ---
# Define explicitamente a raiz do projeto para o Autolinking
PROJECT_ROOT=..
# Força o uso do comando node padrão do ambiente
reactNative.nodeExecutableAndArgs=node

# SUPRESSÃO DE AVISOS
# Esconde avisos de depreciação do Firebase para limpar o log de build
RNFB_SUPPRESS_NEW_ARCHITECTURE_WARNING=true

# CONFIGURAÇÕES DE VELOCIDADE
# Melhora a velocidade de builds incrementais
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true

# Estabilidade para ambientes de CI (GitHub Actions)
org.gradle.parallel=false
org.gradle.configureondemand=true
