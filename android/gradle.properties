# CONFIGURAÇÕES DE MEMÓRIA
# Aumenta a memória disponível para o Gradle não travar no servidor do GitHub
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# SUPORTE PARA BIBLIOTECAS MODERNAS
# Necessário para que o React Native e bibliotecas como Firebase funcionem
android.useAndroidX=true
android.enableJetifier=true

# --- CONFIGURAÇÃO DE ARQUITETURA (SOLUÇÃO DO ERRO) ---
# Desativa a Nova Arquitetura (Fabric/TurboModules) 
# Isso impede que o CMake procure pastas de codegen inexistentes
newArchEnabled=false

# Ativa o motor Hermes para melhor performance e menor tamanho de APK
hermesEnabled=true

# OTIMIZAÇÃO DE COMPILAÇÃO
# Define apenas as arquiteturas necessárias para o APK, acelerando o build
reactNative.Architectures=armeabi-v7a,arm64-v8a

# EVITAR ALERTAS DESNECESSÁRIOS
# Suprime avisos de bibliotecas que ainda não suportam a New Arch
RNFB_SUPPRESS_NEW_ARCHITECTURE_WARNING=true
